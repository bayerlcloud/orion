<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    width: 360px;
    background: #111118;
    border: 1px solid #1e1e2e;
    border-radius: 16px;
    padding: 40px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 12px;
  }
  .logo h1 {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo p {
    color: #6b7280;
    font-size: 13px;
    margin-top: 4px;
  }
  label {
    display: block;
    color: #9ca3af;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #2a2a40;
    border-radius: 8px;
    padding: 11px 14px;
    color: #f3f4f6;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 18px;
  }
  input:focus { border-color: #6366f1; }
  button {
    width: 100%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
    margin-top: 4px;
  }
  button:hover { opacity: .9; }
  .error {
    background: #2d1515;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 18px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Orion</h1>
    <p>v2 — Agente Autônomo</p>
  </div>
  <form method="POST" action="/login">
    <div class="error {{errorClass}}">{{errorMsg}}</div>
    <label>Usuário</label>
    <input type="text" name="username" placeholder="bayerl" autocomplete="username" required autofocus>
    <label>Senha</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
