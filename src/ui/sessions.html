<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion — Conversas</title>
<style>@view-transition{navigation:auto}::view-transition-old(sidebar),::view-transition-new(sidebar){animation-duration:.1s}</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #08080f; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: #1e1e2e; }

/* ── Topbar ── */
.topbar { padding: 14px 20px; border-bottom: 1px solid #111127; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; background: #0a0a12; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.page-title { font-size: 14px; font-weight: 700; color: #e5e7eb; }
.new-btn { display: flex; align-items: center; gap: 5px; background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.14)); border: 1px solid rgba(99,102,241,.35); color: #a5b4fc; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all .15s; white-space: nowrap; }
.new-btn:hover { background: linear-gradient(135deg, rgba(99,102,241,.32), rgba(139,92,246,.22)); border-color: rgba(99,102,241,.6); color: #c7d2fe; }
.new-btn svg { width: 12px; height: 12px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.search-wrap { position: relative; }
.search-wrap input { background: #111118; border: 1px solid #1e1e2e; border-radius: 8px; padding: 6px 10px 6px 28px; color: #e5e7eb; font-size: 12.5px; width: 180px; outline: none; transition: border-color .15s; }
.search-wrap input:focus { border-color: rgba(99,102,241,.5); }
.search-wrap input::placeholder { color: #2d2d45; }
.search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #374151; pointer-events: none; }
.trash-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #4b5563; cursor: pointer; user-select: none; padding: 5px 9px; border: 1px solid #1a1a2e; border-radius: 7px; background: none; transition: all .15s; white-space: nowrap; }
.trash-btn:hover { color: #6b7280; border-color: #2d2d45; }
.trash-btn.active { color: #a5b4fc; border-color: rgba(99,102,241,.3); background: rgba(99,102,241,.08); }

/* ── Content ── */
.content { flex: 1; overflow-y: auto; padding-bottom: 80px; }

/* ── Section ── */
.sec { border-bottom: 1px solid #0d0d1a; }
.sec-hdr { display: flex; align-items: center; gap: 8px; padding: 10px 20px 8px; position: sticky; top: 0; z-index: 10; background: #09090f; cursor: pointer; user-select: none; }
.sec-hdr:hover { background: #0c0c15; }
.sec-arrow { color: #374151; font-size: 10px; transition: transform .15s; width: 10px; }
.sec.collapsed .sec-arrow { transform: rotate(-90deg); }
.sec-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
.sec-open .sec-label { color: #22c55e; }
.sec-standby .sec-label { color: #374151; }
.sec-trash .sec-label { color: #374151; }
.sec-count { font-size: 10px; color: #2d2d45; background: #111118; border: 1px solid #1a1a2e; border-radius: 8px; padding: 1px 6px; }
.sec-body { display: flex; flex-direction: column; }
.sec.collapsed .sec-body { display: none; }

/* ── Item ── */
.item { display: flex; align-items: center; gap: 0; padding: 0 12px 0 0; border-bottom: 1px solid #0d0d1a; text-decoration: none; color: inherit; min-height: 44px; position: relative; transition: background .1s; cursor: pointer; }
.item:hover { background: #0f0f1c; }
.item.is-active { background: rgba(34,197,94,.03); }
.item.is-finished { background: rgba(249,115,22,.03); }
.item.drag-over { background: rgba(99,102,241,.12); border-top: 2px solid #6366f1; }
.item.dragging { opacity: .35; }

/* drag handle */
.drag-h { width: 28px; min-width: 28px; display: flex; align-items: center; justify-content: center; color: #1e1e2e; cursor: grab; font-size: 14px; align-self: stretch; flex-shrink: 0; }
.drag-h:active { cursor: grabbing; }
.sec-standby .drag-h, .sec-trash .drag-h { cursor: default; }

/* status dot */
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: #1e1e2e; }
.dot-active { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.8); animation: pulse-g 1.6s ease-in-out infinite; }
.dot-finished { background: #f97316; box-shadow: 0 0 7px rgba(249,115,22,.8); animation: pulse-o 2s ease-in-out infinite; }
.dot-waiting { background: #f59e0b; box-shadow: 0 0 5px rgba(245,158,11,.5); }
.dot-paused { background: #1e1e2e; }
@keyframes pulse-g { 0%,100%{box-shadow:0 0 4px 1px rgba(34,197,94,.5)} 50%{box-shadow:0 0 9px 3px rgba(34,197,94,.85)} }
@keyframes pulse-o { 0%,100%{box-shadow:0 0 5px 1px rgba(249,115,22,.5)} 50%{box-shadow:0 0 11px 3px rgba(249,115,22,.9)} }

/* item content */
.item-body { flex: 1; min-width: 0; padding: 10px 8px 10px 8px; display: flex; flex-direction: column; gap: 2px; }
.item-title { font-size: 12.5px; font-weight: 600; color: #c9cdd4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item.is-active .item-title { color: #fff; }
.item.is-finished .item-title { color: #fed7aa; }
.item-meta { display: flex; align-items: center; gap: 6px; }
.item-badge { font-size: 9px; font-weight: 700; letter-spacing: .06em; color: #374151; background: #0d0d18; border: 1px solid #1a1a2e; border-radius: 3px; padding: 1px 4px; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-time { font-size: 10.5px; color: #2d2d45; }
.item-msgs { font-size: 10.5px; color: #1e1e2e; }

/* action buttons */
.item-acts { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.act-btn { background: none; border: none; cursor: pointer; padding: 5px; border-radius: 5px; color: #2d2d45; display: flex; align-items: center; opacity: 0; transition: all .12s; }
.item:hover .act-btn { opacity: 1; }
.act-btn:hover { background: rgba(255,255,255,.07); color: #9ca3af; }
.act-btn.open-btn:hover { color: #22c55e; background: rgba(34,197,94,.1); }
.act-btn.close-btn:hover { color: #6b7280; background: rgba(107,114,128,.1); }
.act-btn.trash-btn-ic:hover { color: #f87171; background: rgba(239,68,68,.1); }
.act-btn.restore-btn:hover { color: #a5b4fc; background: rgba(99,102,241,.12); }
.act-btn svg { width: 13px; height: 13px; }
.act-btn.open-btn { opacity: 1; color: #1e1e2e; }

/* stand-by item: mais opaco */
.sec-standby .item { opacity: .8; }
.sec-standby .item:hover { opacity: 1; }

/* trash item */
.sec-trash .item { opacity: .5; }
.sec-trash .item:hover { opacity: .75; }

/* empty */
.empty-msg { padding: 14px 20px; font-size: 12px; color: #1e1e2e; }

/* ── Bulk action bar ── */
.bulk-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a2e; border: 1px solid rgba(99,102,241,.3); border-radius: 14px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.5); opacity: 0; transition: all .2s cubic-bezier(.34,1.56,.64,1); pointer-events: none; z-index: 200; white-space: nowrap; }
.bulk-bar.visible { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: all; }
.bulk-cnt { font-size: 12.5px; font-weight: 600; color: #a5b4fc; margin-right: 4px; }
.bulk-sep { width: 1px; height: 18px; background: #2d2d45; }
.bulk-btn { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,.05); border: 1px solid #2d2d45; color: #9ca3af; padding: 5px 11px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .12s; }
.bulk-btn:hover { background: rgba(255,255,255,.09); color: #e5e7eb; border-color: #374151; }
.bulk-btn.danger:hover { background: rgba(239,68,68,.15); color: #f87171; border-color: rgba(239,68,68,.3); }
.bulk-cancel { background: none; border: none; color: #374151; font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 6px; line-height: 1; transition: color .12s; }
.bulk-cancel:hover { color: #9ca3af; }

@media (max-width: 600px) {
  .topbar { padding: 10px 14px; flex-wrap: wrap; }
  .drag-h { display: none; }
  .bulk-bar { left: 14px; right: 14px; transform: translateY(80px); }
  .bulk-bar.visible { transform: translateY(0); }
}
</style>
</head>
<body>
<!--SIDEBAR-->

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="page-title">Conversas</span>
      <a class="new-btn" href="/sessions?new=1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova
      </a>
    </div>
    <div class="topbar-right">
      <button class="trash-btn" id="trash-btn" onclick="toggleTrash()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        Lixeira <span id="trash-cnt" style="color:#6366f1;font-weight:700;margin-left:2px"></span>
      </button>
      <div class="search-wrap">
        <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="search" placeholder="Buscar…" oninput="renderAll()" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div style="padding:40px;text-align:center;color:#2d2d45;font-size:12px">Carregando…</div>
  </div>
</main>

<!-- Bulk action bar -->
<div class="bulk-bar" id="bulk-bar">
  <span class="bulk-cnt" id="bulk-cnt"></span>
  <div class="bulk-sep"></div>
  <button class="bulk-btn" id="bulk-trash-btn" onclick="bulkTrash()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
    Lixeira
  </button>
  <button class="bulk-btn danger" onclick="bulkDelete()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    Excluir
  </button>
  <div class="bulk-sep"></div>
  <button class="bulk-cancel" onclick="clearSelect()">×</button>
</div>

<script>
let all = []
let showTrash = false
let dragSrcId = null
let dragGroup = null  // 'open' | 'standby'

// ── SVGs ──
const SVG_DRAG   = `<svg viewBox="0 0 10 16" fill="currentColor" width="10" height="14"><circle cx="3" cy="3" r="1.2"/><circle cx="7" cy="3" r="1.2"/><circle cx="3" cy="8" r="1.2"/><circle cx="7" cy="8" r="1.2"/><circle cx="3" cy="13" r="1.2"/><circle cx="7" cy="13" r="1.2"/></svg>`
const SVG_OPEN   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>`
const SVG_CLOSE  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
const SVG_TRASH  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>`
const SVG_RESTORE= `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`
const SVG_ARROW  = `▾`

// ── Helpers ──
function relTime(ts) {
  if (!ts) return ''
  const diff = Math.floor(Date.now() / 1000) - ts
  if (diff < 60) return 'agora'
  if (diff < 3600) return `${Math.floor(diff/60)}m`
  if (diff < 86400) return `${Math.floor(diff/3600)}h`
  if (diff < 604800) return `${Math.floor(diff/86400)}d`
  return new Date(ts*1000).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})
}
function titleOf(s) { return s.custom_title || s.ai_title || s.first_user_msg || s.id.slice(0,8) }
function projOf(s) {
  try {
    const m = titleOf(s).match(/^\[([^\]]+)\]/)
    if (!m) return null
    return (m[1].replace(/-WT\d+$/i,'').trim().split(/[\s-]/)[0]||'').toUpperCase().slice(0,10)||null
  } catch { return null }
}
function shortT(s) { return titleOf(s).replace(/^\[[^\]]+\]\s*/,'').trim() || titleOf(s) }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// ── Item HTML ──
function itemHtml(s, group) {
  const title = shortT(s)
  const badge = projOf(s)
  const dotCls = `dot dot-${s.status||'paused'}`
  const isTrash = group === 'trash'
  const isOpen  = group === 'open'

  const actBtns = isTrash
    ? `<div class="item-acts">
        <button class="act-btn restore-btn" onclick="restoreItem(event,'${s.id}')" title="Restaurar">${SVG_RESTORE}</button>
        <button class="act-btn trash-btn-ic" onclick="deleteItem(event,'${s.id}')" title="Excluir permanentemente">${SVG_TRASH}</button>
       </div>`
    : isOpen
      ? `<div class="item-acts">
          <button class="act-btn trash-btn-ic" onclick="trashItem(event,'${s.id}')" title="Lixeira">${SVG_TRASH}</button>
          <button class="act-btn close-btn" onclick="closeItem(event,'${s.id}')" title="Mover para Stand-by">${SVG_CLOSE}</button>
         </div>`
      : `<div class="item-acts">
          <button class="act-btn trash-btn-ic" onclick="trashItem(event,'${s.id}')" title="Lixeira">${SVG_TRASH}</button>
          <button class="act-btn open-btn" onclick="openItem(event,'${s.id}')" title="Mover para Abertas">${SVG_OPEN}</button>
         </div>`

  const draggable = isOpen ? 'draggable="true"' : ''
  const statusCls = s.status === 'active' ? 'is-active' : s.status === 'finished' ? 'is-finished' : ''
  const href = isTrash ? '#' : `/sessions/${s.id}`

  return `<a class="item ${statusCls}" href="${href}" data-id="${s.id}" data-group="${group}"
    ${draggable}
    onclick="itemClick(event,this,'${s.id}','${group}')"
    ondblclick="itemDbl(event,'${s.id}','${group}')"
    ondragstart="onDragStart(event,'${s.id}','${group}')"
    ondragover="onDragOver(event)"
    ondragleave="onDragLeave(event)"
    ondrop="onDrop(event,'${s.id}','${group}')">
    <div class="drag-h" title="Arrastar para reordenar">${isOpen ? SVG_DRAG : ''}</div>
    <div class="${dotCls}"></div>
    <div class="item-body">
      <div class="item-title">${esc(title)}</div>
      <div class="item-meta">
        ${badge ? `<span class="item-badge">${esc(badge)}</span>` : ''}
        <span class="item-time">${relTime(s.last_modified)}</span>
        <span class="item-msgs">${s.message_count ?? 0} msgs</span>
      </div>
    </div>
    ${actBtns}
  </a>`
}

// ── Section HTML ──
function sectionHtml(id, label, items, group, defaultOpen = true) {
  const collapsed = !defaultOpen ? 'collapsed' : ''
  return `<div class="sec sec-${group} ${collapsed}" id="sec-${id}">
    <div class="sec-hdr" onclick="toggleSec('${id}')">
      <span class="sec-arrow">${SVG_ARROW}</span>
      <span class="sec-label">${label}</span>
      <span class="sec-count">${items.length}</span>
    </div>
    <div class="sec-body" id="sec-body-${id}">
      ${items.length ? items.map(s => itemHtml(s, group)).join('') : `<div class="empty-msg">Nenhuma sessão</div>`}
    </div>
  </div>`
}

// ── Render ──
function renderAll() {
  const q = document.getElementById('search').value.toLowerCase().trim()
  const filter = s => !q || titleOf(s).toLowerCase().includes(q) || (s.first_user_msg||'').toLowerCase().includes(q)

  // Ordem alfabética; nas Abertas o drag manual (sort_order) tem prioridade.
  // Status (bolinha) NÃO influencia a posição — nada de pula-pula.
  const alpha = (a,b) => shortT(a).localeCompare(shortT(b), 'pt-BR', { sensitivity: 'base' })
  const opened  = all.filter(s => !s.hidden && !s.deleted_at && s.opened_at).filter(filter)
    .sort((a,b) => (a.sort_order||0) - (b.sort_order||0) || alpha(a,b))

  const standby = all.filter(s => !s.hidden && !s.deleted_at && !s.opened_at).filter(filter)
    .sort(alpha)

  const trash   = all.filter(s => s.hidden && !s.deleted_at).filter(filter)
    .sort((a,b) => (b.last_modified||0) - (a.last_modified||0))

  const trashCnt = trash.length
  document.getElementById('trash-cnt').textContent = trashCnt || ''
  document.getElementById('trash-btn').classList.toggle('active', showTrash)

  // badge de sessões no sidebar
  const _sb = document.getElementById('sessions-badge')
  if (_sb) _sb.textContent = opened.length + standby.length

  // Lixeira SEMPRE no final (recolhida por padrão; botão do topo expande)
  let html = sectionHtml('open', 'Abertas', opened, 'open', true)
           + sectionHtml('standby', 'Stand-by', standby, 'standby', true)
           + sectionHtml('trash', 'Lixeira', trash, 'trash', showTrash)

  document.getElementById('content').innerHTML = html
}

// ── Interactions ──
function toggleTrash() {
  showTrash = !showTrash
  renderAll()
}

function toggleSec(id) {
  document.getElementById(`sec-${id}`).classList.toggle('collapsed')
}

// 1 clique numa Stand-by: só navega (com delay p/ detectar duplo)
// 2 cliques: vira Aberta, entrando no FINAL da lista
let _navT = null
function itemClick(e, el, id, group) {
  if (group === 'trash') { e.preventDefault(); return }
  if (selected.size > 0) { e.preventDefault(); toggleSelect(id); return }
  if (group === 'standby') {
    e.preventDefault()
    clearTimeout(_navT)
    _navT = setTimeout(() => location.href = '/sessions/' + id, 260)
  }
}
function itemDbl(e, id, group) {
  if (group !== 'standby') return
  e.preventDefault(); clearTimeout(_navT)
  // keepalive: o fetch completa mesmo com a navegação em curso
  try { fetch(`/api/claude-sessions/${id}/open`, { method: 'PUT', keepalive: true }) } catch {}
  location.href = '/sessions/' + id
}

// ── Open / Close / Trash ──
async function openItem(e, id) {
  e.preventDefault(); e.stopPropagation()
  await fetch(`/api/claude-sessions/${id}/open`, { method: 'PUT' })
  const s = all.find(x => x.id === id)
  if (s) { s.opened_at = Math.floor(Date.now()/1000); s.sort_order = 9999 }
  renderAll()
}

async function closeItem(e, id) {
  e.preventDefault(); e.stopPropagation()
  await fetch(`/api/claude-sessions/${id}/open`, { method: 'DELETE' })
  const s = all.find(x => x.id === id)
  if (s) { s.opened_at = null }
  renderAll()
}

async function trashItem(e, id) {
  e.preventDefault(); e.stopPropagation()
  await fetch(`/api/claude-sessions/${id}/hide`, { method: 'PATCH' })
  const s = all.find(x => x.id === id); if (s) { s.hidden = 1; s.opened_at = null }
  renderAll()
}

async function restoreItem(e, id) {
  e.preventDefault(); e.stopPropagation()
  await fetch(`/api/claude-sessions/${id}/show`, { method: 'PATCH' })
  const s = all.find(x => x.id === id); if (s) s.hidden = 0
  renderAll()
}

async function deleteItem(e, id) {
  e.preventDefault(); e.stopPropagation()
  if (!confirm('Excluir permanentemente esta conversa? Não tem como desfazer.')) return
  await fetch(`/api/claude-sessions/${id}`, { method: 'DELETE' })
  const i = all.findIndex(x => x.id === id); if (i >= 0) all.splice(i, 1)
  renderAll()
}

// ── Drag-and-drop (só grupo "open") ──
function onDragStart(e, id, group) {
  if (group !== 'open') { e.preventDefault(); return }
  dragSrcId = id
  dragGroup = group
  e.dataTransfer.effectAllowed = 'move'
  setTimeout(() => e.target.classList.add('dragging'), 0)
}

function onDragOver(e) {
  const item = e.currentTarget
  if (item.dataset.group !== 'open' || item.dataset.id === dragSrcId) return
  e.preventDefault()
  e.dataTransfer.dropEffect = 'move'
  document.querySelectorAll('.item.drag-over').forEach(el => el.classList.remove('drag-over'))
  item.classList.add('drag-over')
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over')
}

async function onDrop(e, targetId, group) {
  e.preventDefault()
  e.currentTarget.classList.remove('drag-over')
  document.querySelectorAll('.item.dragging').forEach(el => el.classList.remove('dragging'))
  if (group !== 'open' || !dragSrcId || dragSrcId === targetId) { dragSrcId = null; return }

  // Reordenar localmente
  const opened = all.filter(s => !s.hidden && !s.deleted_at && s.opened_at)
    .sort((a,b) => (a.sort_order??9999) - (b.sort_order??9999) || (a.opened_at||0) - (b.opened_at||0))

  const srcIdx = opened.findIndex(s => s.id === dragSrcId)
  const dstIdx = opened.findIndex(s => s.id === targetId)
  if (srcIdx < 0 || dstIdx < 0) { dragSrcId = null; return }

  const [moved] = opened.splice(srcIdx, 1)
  opened.splice(dstIdx, 0, moved)

  // Atualizar sort_order local
  opened.forEach((s, i) => s.sort_order = i)

  dragSrcId = null
  renderAll()

  // Persistir no backend
  fetch('/api/claude-sessions/reorder', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ids: opened.map(s => s.id) })
  }).catch(() => {})
}

// ── Multi-select ──
const selected = new Set()

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id)
  else selected.add(id)
  updateBulkBar()
  document.querySelectorAll(`.item[data-id="${id}"]`).forEach(el => {
    el.style.background = selected.has(id) ? 'rgba(99,102,241,.08)' : ''
  })
}

function clearSelect() {
  selected.clear()
  document.querySelectorAll('.item').forEach(el => el.style.background = '')
  updateBulkBar()
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar')
  const n = selected.size
  bar.classList.toggle('visible', n > 0)
  document.getElementById('bulk-cnt').textContent = n === 1 ? '1 selecionada' : `${n} selecionadas`
}

async function bulkTrash() {
  const ids = [...selected]
  await Promise.all(ids.map(id => fetch(`/api/claude-sessions/${id}/hide`, { method: 'PATCH' })))
  ids.forEach(id => { const s = all.find(x=>x.id===id); if(s){ s.hidden=1; s.opened_at=null } })
  clearSelect(); renderAll()
}

async function bulkDelete() {
  if (!confirm(`Excluir permanentemente ${selected.size} conversa(s)?`)) return
  const ids = [...selected]
  await Promise.all(ids.map(id => fetch(`/api/claude-sessions/${id}`, { method: 'DELETE' })))
  ids.forEach(id => { const i=all.findIndex(x=>x.id===id); if(i>=0) all.splice(i,1) })
  clearSelect(); renderAll()
}

// ── SSE ──
const es = new EventSource('/api/claude-sessions/stream')
es.onmessage = async e => {
  const d = JSON.parse(e.data)
  if (d.type === 'new_session') {
    const res = await fetch(`/api/claude-sessions/${d.sessionId}`).catch(() => null)
    if (res?.ok) {
      const { session } = await res.json()
      if (session && !all.find(s => s.id === session.id)) { all.push({ ...session, status: 'paused' }); renderAll() }
    }
  }
  if (d.type === 'session_deleted') {
    const s = all.find(x => x.id === d.sessionId); if (s) { s.status = 'deleted'; renderAll() }
  }
  if (d.type === 'status_changed') {
    const active = new Set(d.active || [])
    const finished = new Set(d.finished || [])
    all.forEach(s => {
      if (s.hidden) return
      if (active.has(s.id)) s.status = 'active'
      else if (finished.has(s.id)) s.status = 'finished'
      else if (s.status === 'active' || s.status === 'waiting') s.status = 'paused'
    })
    renderAll()
  }
}
// EventSource reconecta sozinho — nada de location.reload() (virava loop de
// reload em toda aba aberta durante um pm2 restart). Ao reconectar, ressincroniza.
let _sseWasDown = false
es.onerror = () => { _sseWasDown = true }
es.onopen = () => { if (_sseWasDown) { _sseWasDown = false; load() } }

// ── Polling 10s ──
setInterval(async () => {
  const { sessions } = await fetch('/api/claude-sessions?limit=500&showHidden=true').then(r=>r.json()).catch(()=>({sessions:[]}))
  if (!sessions?.length) return
  let changed = false
  for (const s of sessions) {
    const local = all.find(x => x.id === s.id)
    if (!local) { all.push(s); changed = true }
    else if (local.status !== s.status || local.hidden !== s.hidden || local.opened_at !== s.opened_at || local.sort_order !== s.sort_order) {
      Object.assign(local, s); changed = true
    }
  }
  if (changed) renderAll()
}, 10_000)

// ── Init ──
async function load() {
  const { sessions } = await fetch('/api/claude-sessions?limit=500&showHidden=true').then(r=>r.json())
  all = sessions || []
  renderAll()
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') clearSelect() })
document.addEventListener('dragend', () => {
  document.querySelectorAll('.item.dragging,.item.drag-over').forEach(el => {
    el.classList.remove('dragging','drag-over')
  })
})

load()
</script>
