<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion — Conversas</title>
<style>@view-transition{navigation:auto}::view-transition-old(sidebar),::view-transition-new(sidebar){animation-duration:.1s}</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #08080f; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: #1e1e2e; }

/* ── Topbar ── */
.topbar { padding: 14px 24px; border-bottom: 1px solid #111127; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 12px; background: #0a0a12; }
.topbar-left { display: flex; align-items: center; gap: 14px; }
.page-title { font-size: 15px; font-weight: 700; color: #e5e7eb; }
.new-btn { display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.14)); border: 1px solid rgba(99,102,241,.35); color: #a5b4fc; padding: 7px 14px; border-radius: 9px; font-size: 12.5px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all .15s; white-space: nowrap; }
.new-btn:hover { background: linear-gradient(135deg, rgba(99,102,241,.32), rgba(139,92,246,.22)); border-color: rgba(99,102,241,.6); color: #c7d2fe; }
.new-btn svg { width: 13px; height: 13px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.search-wrap { position: relative; }
.search-wrap input { background: #111118; border: 1px solid #1e1e2e; border-radius: 8px; padding: 7px 12px 7px 32px; color: #e5e7eb; font-size: 13px; width: 200px; outline: none; transition: border-color .15s; }
.search-wrap input:focus { border-color: rgba(99,102,241,.5); }
.search-wrap input::placeholder { color: #374151; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #4b5563; pointer-events: none; }
.trash-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #4b5563; cursor: pointer; user-select: none; padding: 6px 10px; border: 1px solid #1a1a2e; border-radius: 7px; background: none; transition: all .15s; white-space: nowrap; }
.trash-toggle:hover { color: #6b7280; border-color: #2d2d45; }
.trash-toggle input { accent-color: #6366f1; }
.trash-toggle.active { color: #a5b4fc; border-color: rgba(99,102,241,.3); background: rgba(99,102,241,.08); }

/* ── Stats bar ── */
.statsbar { display: flex; align-items: center; gap: 6px; padding: 10px 24px; border-bottom: 1px solid #0f0f1e; background: #09090f; flex-shrink: 0; flex-wrap: wrap; }
.stat-chip { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid transparent; cursor: default; }
.stat-chip .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.stat-active { background: rgba(34,197,94,.08); border-color: rgba(34,197,94,.2); color: #22c55e; }
.stat-active .dot { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,.7); animation: pulse-g 1.6s ease-in-out infinite; }
.stat-finished { background: rgba(249,115,22,.08); border-color: rgba(249,115,22,.25); color: #f97316; }
.stat-finished .dot { background: #f97316; box-shadow: 0 0 6px rgba(249,115,22,.7); animation: pulse-o 2s ease-in-out infinite; }
.stat-waiting { background: rgba(245,158,11,.07); border-color: rgba(245,158,11,.18); color: #f59e0b; }
.stat-waiting .dot { background: #f59e0b; box-shadow: 0 0 5px rgba(245,158,11,.5); }
.stat-paused { background: rgba(107,114,128,.07); border-color: rgba(107,114,128,.15); color: #6b7280; }
.stat-paused .dot { background: #374151; }
.stat-trash { background: rgba(239,68,68,.06); border-color: rgba(239,68,68,.13); color: #6b7280; font-weight: 500; }
.stat-trash .dot { background: #374151; }
.stat-sep { flex: 1; }
.stat-updated { font-size: 11px; color: #2d2d45; }
@keyframes pulse-g { 0%,100%{box-shadow:0 0 4px 1px rgba(34,197,94,.5)} 50%{box-shadow:0 0 9px 3px rgba(34,197,94,.85)} }
@keyframes pulse-o { 0%,100%{box-shadow:0 0 5px 1px rgba(249,115,22,.5)} 50%{box-shadow:0 0 11px 3px rgba(249,115,22,.9)} }

/* ── Content ── */
.content { padding: 20px 24px; flex: 1; padding-bottom: 80px; }

/* ── Section header ── */
.sec-hdr { display: flex; align-items: center; gap: 10px; margin: 0 0 12px; }
.sec-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
.sec-count { font-size: 11px; font-weight: 500; color: #374151; background: #111118; border: 1px solid #1a1a2e; border-radius: 10px; padding: 1px 7px; }
.sec-line { flex: 1; height: 1px; background: #111127; }
.sec-active .sec-label { color: #22c55e; }
.sec-finished .sec-label { color: #f97316; }
.sec-waiting .sec-label { color: #f59e0b; }
.sec-paused .sec-label { color: #374151; }
.sec-trash .sec-label { color: #374151; }
.section { margin-bottom: 28px; }

/* ── Cards ── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
.card { background: #0f0f1a; border: 1px solid #1a1a2e; border-radius: 12px; padding: 15px 16px 15px 42px; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; gap: 8px; transition: all .15s; position: relative; }
.card:hover { border-color: rgba(99,102,241,.4); background: #121222; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.3); }
.card-top { display: flex; align-items: center; gap: 7px; }
.card-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.card-badge { font-size: 9px; font-weight: 700; letter-spacing: .06em; color: #374151; background: #0d0d18; border: 1px solid #1a1a2e; border-radius: 4px; padding: 1px 5px; white-space: nowrap; max-width: 72px; overflow: hidden; text-overflow: ellipsis; }
.card-time { font-size: 10.5px; color: #2d2d45; margin-left: auto; }
.card-title { font-size: 13px; font-weight: 600; color: #d1d5db; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; padding-right: 20px; }
.card-preview { font-size: 11.5px; color: #4b5563; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-foot { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.card-msgs { font-size: 10.5px; color: #2d2d45; }
.card-act { position: absolute; top: 10px; right: 10px; background: none; border: none; cursor: pointer; opacity: 0; transition: opacity .15s; padding: 4px; border-radius: 5px; color: #374151; display: flex; align-items: center; }
.card-act:hover { background: rgba(239,68,68,.15); color: #f87171; opacity: 1 !important; }
.card:hover .card-act { opacity: 1; }
.card-act svg { width: 12px; height: 12px; }

/* ── Checkbox (multi-select) ── */
.card-cb { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; }
.cb-box { width: 16px; height: 16px; border-radius: 5px; border: 1.5px solid #2d2d45; background: transparent; transition: all .12s; display: flex; align-items: center; justify-content: center; opacity: 0; }
.card:hover .cb-box { opacity: 1; }
body.select-mode .cb-box { opacity: 1; }
.card.selected .cb-box { background: #6366f1; border-color: #6366f1; opacity: 1; }
.card.selected { border-color: rgba(99,102,241,.5) !important; background: rgba(99,102,241,.07) !important; }
.cb-check { display: none; }
.card.selected .cb-check { display: block; }
.cb-box svg { width: 10px; height: 10px; color: #fff; stroke-width: 3; }

/* active card */
.card.s-active { border-color: rgba(34,197,94,.2); background: rgba(34,197,94,.03); }
.card.s-active:hover { border-color: rgba(34,197,94,.45); }
.card.s-active .card-dot { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.8); animation: pulse-g 1.6s ease-in-out infinite; }
.card.s-active .card-title { color: #fff; }
/* finished card */
.card.s-finished { border-color: rgba(249,115,22,.2); background: rgba(249,115,22,.03); }
.card.s-finished:hover { border-color: rgba(249,115,22,.4); }
.card.s-finished .card-dot { background: #f97316; box-shadow: 0 0 7px rgba(249,115,22,.8); animation: pulse-o 2s ease-in-out infinite; }
.card.s-finished .card-title { color: #fed7aa; }
/* waiting card */
.card.s-waiting { border-color: rgba(245,158,11,.15); }
.card.s-waiting:hover { border-color: rgba(245,158,11,.35); }
.card.s-waiting .card-dot { background: #f59e0b; box-shadow: 0 0 5px rgba(245,158,11,.5); }
/* paused */
.card.s-paused .card-dot { background: #252538; }
/* trash */
.card.s-trash { opacity: .5; }
.card.s-trash:hover { opacity: .75; }
.card.s-trash .card-dot { background: #1e1e2e; }
.card.s-trash .card-title { color: #6b7280; }

.empty { color: #2d2d45; font-size: 12px; padding: 6px 0; }

/* ── Bulk action bar ── */
.bulk-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a2e; border: 1px solid rgba(99,102,241,.3); border-radius: 14px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.5); opacity: 0; transition: all .2s cubic-bezier(.34,1.56,.64,1); pointer-events: none; z-index: 200; white-space: nowrap; }
.bulk-bar.visible { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: all; }
.bulk-cnt { font-size: 12.5px; font-weight: 600; color: #a5b4fc; margin-right: 4px; }
.bulk-sep { width: 1px; height: 18px; background: #2d2d45; }
.bulk-btn { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,.05); border: 1px solid #2d2d45; color: #9ca3af; padding: 5px 11px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .12s; }
.bulk-btn:hover { background: rgba(255,255,255,.09); color: #e5e7eb; border-color: #374151; }
.bulk-btn.danger:hover { background: rgba(239,68,68,.15); color: #f87171; border-color: rgba(239,68,68,.3); }
.bulk-btn.restore:hover { background: rgba(99,102,241,.15); color: #a5b4fc; border-color: rgba(99,102,241,.3); }
.bulk-cancel { background: none; border: none; color: #374151; font-size: 18px; cursor: pointer; padding: 2px 4px; border-radius: 6px; line-height: 1; transition: color .12s; }
.bulk-cancel:hover { color: #9ca3af; }

@media (max-width: 600px) {
  .topbar { padding: 10px 14px; flex-wrap: wrap; }
  .content { padding: 14px; padding-bottom: 80px; }
  .grid { grid-template-columns: 1fr; }
  .card:hover { transform: none; }
  .statsbar { padding: 8px 14px; gap: 4px; }
  .stat-chip { padding: 4px 9px; font-size: 11px; }
  .bulk-bar { left: 14px; right: 14px; transform: translateY(80px); }
  .bulk-bar.visible { transform: translateY(0); }
}
</style>
</head>
<body>
<!--SIDEBAR-->

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="page-title">Conversas</span>
      <a class="new-btn" href="/sessions?new=1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova sessão
      </a>
    </div>
    <div class="topbar-right">
      <label class="trash-toggle" id="trash-lbl">
        <input type="checkbox" id="toggle-trash" onchange="renderAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        Lixeira <span id="trash-cnt" style="color:#6366f1;font-weight:700"></span>
      </label>
      <div class="search-wrap">
        <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="search" placeholder="Buscar sessão..." oninput="renderAll()" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="statsbar">
    <div class="stat-chip stat-active"><div class="dot"></div><span id="cnt-active">—</span> ativas</div>
    <div class="stat-chip stat-finished" id="chip-finished" style="display:none"><div class="dot"></div><span id="cnt-finished">0</span> aguardando</div>
    <div class="stat-chip stat-waiting"><div class="dot"></div><span id="cnt-waiting">—</span> recentes</div>
    <div class="stat-chip stat-paused"><div class="dot"></div><span id="cnt-paused">—</span> fechadas</div>
    <div class="stat-chip stat-trash"><div class="dot"></div><span id="cnt-trash">—</span> na lixeira</div>
    <span class="stat-sep"></span>
    <span class="stat-updated" id="stat-updated"></span>
  </div>

  <div class="content" id="content">
    <div style="text-align:center;padding:60px;color:#2d2d45;font-size:13px">Carregando conversas…</div>
  </div>
</main>

<!-- Bulk action bar -->
<div class="bulk-bar" id="bulk-bar">
  <span class="bulk-cnt" id="bulk-cnt"></span>
  <div class="bulk-sep"></div>
  <button class="bulk-btn restore" id="bulk-restore" onclick="bulkRestore()" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    Restaurar
  </button>
  <button class="bulk-btn" id="bulk-trash-btn" onclick="bulkTrash()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
    Lixeira
  </button>
  <button class="bulk-btn danger" onclick="bulkDelete()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    Excluir permanentemente
  </button>
  <div class="bulk-sep"></div>
  <button class="bulk-cancel" onclick="clearSelect()" title="Cancelar">×</button>
</div>

<script>
let all = []
const selected = new Set()

function relTime(ts) {
  if (!ts) return ''
  const diff = Math.floor(Date.now() / 1000) - ts
  if (diff < 60) return 'agora'
  if (diff < 3600) return `${Math.floor(diff/60)}m`
  if (diff < 86400) return `${Math.floor(diff/3600)}h`
  if (diff < 604800) return `${Math.floor(diff/86400)}d`
  return new Date(ts*1000).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})
}
function titleOf(s) { return s.custom_title || s.ai_title || s.first_user_msg || s.id.slice(0,8) }
function projOf(s) {
  try {
    const m = titleOf(s).match(/^\[([^\]]+)\]/)
    if (!m) return null
    return (m[1].replace(/-WT\d+$/i,'').trim().split(/[\s-]/)[0]||'').toUpperCase().slice(0,10)||null
  } catch { return null }
}
function shortT(s) { return titleOf(s).replace(/^\[[^\]]+\]\s*/,'').trim() || titleOf(s) }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

const trashSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>`
const restoreSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`
const checkSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`

function card(s, inTrash) {
  const title = shortT(s)
  const preview = (s.custom_title || s.ai_title) ? (s.first_user_msg || '') : ''
  const badge = projOf(s)
  const cls = inTrash ? 's-trash' : `s-${s.status || 'paused'}`
  const isSel = selected.has(s.id)
  const actBtn = inTrash
    ? `<button class="card-act" onclick="restoreCard(event,'${s.id}')" title="Restaurar" style="color:#6366f1">${restoreSVG}</button>`
    : `<button class="card-act" onclick="trashCard(event,'${s.id}')" title="Mover para lixeira">${trashSVG}</button>`
  const href = inTrash ? '#' : `/sessions/${s.id}`
  return `<a class="card ${cls}${isSel?' selected':''}" href="${href}" data-id="${s.id}" data-trash="${inTrash?1:0}" onclick="cardClick(event,this,'${s.id}','${inTrash?1:0}')">
    <div class="card-cb" onclick="cbClick(event,'${s.id}')">
      <div class="cb-box">
        <span class="cb-check">${checkSVG}</span>
      </div>
    </div>
    ${actBtn}
    <div class="card-top">
      <div class="card-dot"></div>
      ${badge ? `<span class="card-badge">${esc(badge)}</span>` : ''}
      <span class="card-time">${relTime(s.last_modified)}</span>
    </div>
    <div class="card-title">${esc(title)}</div>
    ${preview ? `<div class="card-preview">${esc(preview)}</div>` : ''}
    <div class="card-foot">
      <span class="card-msgs">${s.message_count ?? 0} msgs</span>
    </div>
  </a>`
}

function cardClick(e, el, id, inTrash) {
  if (inTrash === '1') { e.preventDefault(); return }
  if (selected.size > 0) { e.preventDefault(); toggleSelect(id) }
}

function cbClick(e, id) {
  e.preventDefault(); e.stopPropagation()
  toggleSelect(id)
}

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id)
  else selected.add(id)
  updateBulkBar()
  document.querySelectorAll(`.card[data-id="${id}"]`).forEach(el => {
    el.classList.toggle('selected', selected.has(id))
  })
  document.body.classList.toggle('select-mode', selected.size > 0)
}

function clearSelect() {
  selected.clear()
  document.body.classList.remove('select-mode')
  document.querySelectorAll('.card.selected').forEach(el => el.classList.remove('selected'))
  updateBulkBar()
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar')
  const cnt = document.getElementById('bulk-cnt')
  const n = selected.size
  bar.classList.toggle('visible', n > 0)
  cnt.textContent = n === 1 ? '1 selecionada' : `${n} selecionadas`

  const hasTrash = [...selected].some(id => {
    const s = all.find(x => x.id === id)
    return s && s.hidden
  })
  const hasNormal = [...selected].some(id => {
    const s = all.find(x => x.id === id)
    return s && !s.hidden
  })
  document.getElementById('bulk-restore').style.display = hasTrash ? '' : 'none'
  document.getElementById('bulk-trash-btn').style.display = hasNormal ? '' : 'none'
}

async function bulkTrash() {
  const ids = [...selected].filter(id => { const s = all.find(x=>x.id===id); return s && !s.hidden })
  await Promise.all(ids.map(id => fetch(`/api/claude-sessions/${id}/hide`, { method: 'PATCH' })))
  ids.forEach(id => { const s = all.find(x=>x.id===id); if(s) s.hidden = 1 })
  clearSelect()
  renderAll()
}

async function bulkRestore() {
  const ids = [...selected].filter(id => { const s = all.find(x=>x.id===id); return s && s.hidden })
  await Promise.all(ids.map(id => fetch(`/api/claude-sessions/${id}/show`, { method: 'PATCH' })))
  ids.forEach(id => { const s = all.find(x=>x.id===id); if(s) s.hidden = 0 })
  clearSelect()
  renderAll()
}

async function bulkDelete() {
  const ids = [...selected]
  if (!ids.length) return
  if (!confirm(`Excluir permanentemente ${ids.length} conversa(s)? Não tem como desfazer.`)) return
  await Promise.all(ids.map(id => fetch(`/api/claude-sessions/${id}`, { method: 'DELETE' })))
  ids.forEach(id => { const i = all.findIndex(x=>x.id===id); if(i>=0) all.splice(i,1) })
  clearSelect()
  renderAll()
}

async function trashCard(e, id) {
  e.preventDefault(); e.stopPropagation()
  await fetch(`/api/claude-sessions/${id}/hide`, { method: 'PATCH' })
  const s = all.find(x => x.id === id); if (s) s.hidden = 1
  renderAll()
}

async function restoreCard(e, id) {
  e.preventDefault(); e.stopPropagation()
  await fetch(`/api/claude-sessions/${id}/show`, { method: 'PATCH' })
  const s = all.find(x => x.id === id); if (s) s.hidden = 0
  renderAll()
}

function section(label, items, cls, inTrash = false) {
  if (!items.length) return ''
  return `<div class="section sec-${cls}">
    <div class="sec-hdr">
      <span class="sec-label">${label}</span>
      <span class="sec-count">${items.length}</span>
      <div class="sec-line"></div>
    </div>
    <div class="grid">${items.map(s => card(s, inTrash)).join('')}</div>
  </div>`
}

function renderAll() {
  const q = document.getElementById('search').value.toLowerCase()
  const showTrash = document.getElementById('toggle-trash').checked
  document.getElementById('trash-lbl').classList.toggle('active', showTrash)

  const visible = q
    ? all.filter(s => titleOf(s).toLowerCase().includes(q) || (s.first_user_msg||'').toLowerCase().includes(q))
    : all

  const active   = visible.filter(s => !s.hidden && s.status === 'active')
  const finished = visible.filter(s => !s.hidden && s.status === 'finished')
  const waiting  = visible.filter(s => !s.hidden && s.status === 'waiting')
  const paused   = visible.filter(s => !s.hidden && s.status !== 'active' && s.status !== 'finished' && s.status !== 'waiting' && s.status !== 'deleted')
  const trash    = visible.filter(s => s.hidden && !s.deleted_at)

  document.getElementById('cnt-active').textContent = active.length
  document.getElementById('cnt-finished').textContent = finished.length
  document.getElementById('chip-finished').style.display = finished.length ? '' : 'none'
  document.getElementById('cnt-waiting').textContent = waiting.length
  document.getElementById('cnt-paused').textContent = paused.length
  document.getElementById('cnt-trash').textContent = trash.length
  document.getElementById('trash-cnt').textContent = trash.length ? trash.length : ''
  document.getElementById('stat-updated').textContent = 'atualizado ' + relTime(Math.floor(Date.now()/1000))

  const _sb = document.getElementById('sessions-badge')
  if (_sb) _sb.textContent = active.length + finished.length + waiting.length + paused.length

  let html = section('Ativas', active, 'active')
           + section('Aguardando você', finished, 'finished')
           + section('Recentes', waiting, 'waiting')
           + section('Fechadas', paused, 'paused')
  if (showTrash && trash.length) html += section('Lixeira', trash, 'trash', true)
  if (!html) html = `<div class="empty" style="padding:40px 0;text-align:center;color:#2d2d45">Nenhuma sessão encontrada</div>`

  document.getElementById('content').innerHTML = html
}

// SSE em tempo real
const es = new EventSource('/api/claude-sessions/stream')
es.onmessage = async e => {
  const d = JSON.parse(e.data)
  if (d.type === 'new_session') {
    const res = await fetch(`/api/claude-sessions/${d.sessionId}`).catch(() => null)
    if (res?.ok) {
      const { session } = await res.json()
      if (session && !all.find(s => s.id === session.id)) { all.unshift({ ...session, status: 'paused' }); renderAll() }
    }
  }
  if (d.type === 'session_deleted') {
    const s = all.find(x => x.id === d.sessionId); if (s) { s.status = 'deleted'; renderAll() }
  }
  if (d.type === 'status_changed') {
    const active = new Set(d.active || [])
    const finished = new Set(d.finished || [])
    all.forEach(s => {
      if (s.hidden) return
      if (active.has(s.id)) s.status = 'active'
      else if (finished.has(s.id)) s.status = 'finished'
      else if (s.status === 'active') s.status = 'paused'
    })
    renderAll()
  }
}
es.onerror = () => setTimeout(() => location.reload(), 5000)

// Polling de atualização a cada 10s
setInterval(async () => {
  const { sessions } = await fetch('/api/claude-sessions?limit=500&showHidden=true').then(r => r.json()).catch(() => ({ sessions: [] }))
  if (!sessions?.length) return
  let changed = false
  for (const s of sessions) {
    const local = all.find(x => x.id === s.id)
    if (!local) { all.unshift(s); changed = true }
    else if (local.status !== s.status || local.hidden !== s.hidden || local.message_count !== s.message_count) { Object.assign(local, s); changed = true }
  }
  if (changed) renderAll()
}, 10_000)

async function load() {
  const { sessions } = await fetch('/api/claude-sessions?limit=500&showHidden=true').then(r => r.json())
  all = sessions || []
  renderAll()
}

// Esc cancela seleção
document.addEventListener('keydown', e => { if (e.key === 'Escape') clearSelect() })

load()
</script>
