<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orion — Admin</title>
<style>@view-transition{navigation:auto}::view-transition-old(sidebar),::view-transition-new(sidebar){animation-duration:.1s}</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
.topbar { padding: 16px 24px; border-bottom: 1px solid #1e1e2e; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.topbar h1 { font-size: 16px; font-weight: 700; }
.topbar-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
.tabs { display: flex; gap: 2px; padding: 12px 24px 0; border-bottom: 1px solid #1e1e2e; flex-shrink: 0; }
.tab { padding: 8px 16px; font-size: 13px; font-weight: 500; color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
.tab.active { color: #6366f1; border-color: #6366f1; }
.tab:hover:not(.active) { color: #e5e7eb; }
.content { padding: 24px; flex: 1; }
.section { display: none; }
.section.active { display: block; }

/* Cards / Stats */
.stats-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card { background: #111118; border: 1px solid #1e1e2e; border-radius: 10px; padding: 14px 18px; min-width: 120px; }
.stat-n { font-size: 22px; font-weight: 700; color: #fff; }
.stat-l { font-size: 11px; color: #6b7280; margin-top: 2px; }

/* Users Table */
.card-wrap { background: #111118; border: 1px solid #1e1e2e; border-radius: 12px; overflow: hidden; }
.card-header { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1e1e2e; }
.card-title { font-size: 14px; font-weight: 600; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #1e1e2e; }
td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #0f0f1a; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.badge-owner { background: #1e1b4b; color: #818cf8; }
.badge-collab { background: #1a2520; color: #34d399; }
.badge-inactive { background: #1f1010; color: #f87171; }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.td-user { display: flex; align-items: center; gap: 10px; }
.td-username { font-weight: 600; }
.td-display { font-size: 11px; color: #6b7280; margin-top: 1px; }
.actions { display: flex; gap: 6px; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-primary { background: #6366f1; color: #fff; border-color: #6366f1; }
.btn-primary:hover { background: #4f52d3; }
.btn-ghost { background: transparent; color: #9ca3af; border-color: #2a2a40; }
.btn-ghost:hover { color: #e5e7eb; border-color: #4b5563; }
.btn-danger { background: transparent; color: #f87171; border-color: #7f1d1d33; }
.btn-danger:hover { background: rgba(239,68,68,.1); }
.btn-success { background: transparent; color: #34d399; border-color: #064e3b33; }
.btn-success:hover { background: rgba(52,211,153,.1); }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: #111118; border: 1px solid #2a2a40; border-radius: 16px; padding: 28px; width: 420px; max-width: 95vw; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
label { display: block; font-size: 12px; font-weight: 500; color: #9ca3af; margin-bottom: 6px; }
input, select, textarea { width: 100%; background: #1a1a2e; border: 1px solid #2a2a40; border-radius: 8px; padding: 9px 12px; color: #f3f4f6; font-size: 13px; outline: none; transition: border-color .2s; }
input:focus, select:focus { border-color: #6366f1; }
.field-row { display: flex; gap: 12px; }
.field-row .field { flex: 1; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
.color-picker-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
.color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s, border-color .15s; }
.color-opt.selected { border-color: #fff; transform: scale(1.15); }

/* Activity log */
.log-table { font-size: 12px; }
.log-table th { font-size: 10px; }
.log-table td { padding: 8px 12px; }
.method-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; }
.method-GET { background: #1a2520; color: #34d399; }
.method-POST { background: #1e1b4b; color: #818cf8; }
.method-PATCH,.method-PUT { background: #1c1a10; color: #fbbf24; }
.method-DELETE { background: #1f1010; color: #f87171; }
.status-ok { color: #34d399; }
.status-err { color: #f87171; }
.status-warn { color: #fbbf24; }
.log-path { font-family: monospace; color: #c4b5fd; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-user { display: inline-flex; align-items: center; gap: 5px; }
.log-avatar { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: #fff; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.log-filter { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.log-filter select, .log-filter input { width: auto; padding: 6px 10px; font-size: 12px; }

/* Profile */
.profile-card { background: #111118; border: 1px solid #1e1e2e; border-radius: 12px; padding: 24px; max-width: 420px; }
.profile-avatar-big { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 16px; }
.profile-name { font-size: 18px; font-weight: 700; }
.profile-role { font-size: 12px; color: #6b7280; margin-top: 2px; margin-bottom: 20px; }
.divider { height: 1px; background: #1e1e2e; margin: 20px 0; }
</style>
</head>
<body>
<!--SIDEBAR-->
<main class="main">
  <div class="topbar">
    <div>
      <h1 id="page-title">Admin</h1>
      <div class="topbar-sub" id="page-sub">Gerenciamento do Orion</div>
    </div>
  </div>
  <div class="tabs" id="tabs-bar">
    <div class="tab active" data-tab="users" onclick="switchTab('users')">Usuários</div>
    <div class="tab" data-tab="activity" onclick="switchTab('activity')">Atividade</div>
    <div class="tab" data-tab="profile" onclick="switchTab('profile')">Meu Perfil</div>
  </div>
  <div class="content">

    <!-- ── Usuários ── -->
    <div class="section active" id="sec-users">
      <div class="stats-row" id="users-stats"></div>
      <div class="card-wrap">
        <div class="card-header">
          <span class="card-title">Usuários</span>
          <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Novo colaborador</button>
        </div>
        <table id="users-table">
          <thead><tr><th>Usuário</th><th>Papel</th><th>Último login</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody id="users-tbody"><tr><td colspan="5" style="text-align:center;color:#4b5563;padding:24px">Carregando…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- ── Atividade ── -->
    <div class="section" id="sec-activity">
      <div class="log-filter">
        <span class="live-dot" id="live-dot"></span><span style="font-size:12px;color:#6b7280">ao vivo</span>
        <select id="filter-user" onchange="reloadLogs()"><option value="">Todos os usuários</option></select>
        <input id="filter-path" placeholder="Filtrar por rota…" style="width:180px" oninput="filterLogsLocal()">
        <button class="btn btn-ghost btn-sm" onclick="reloadLogs()">Atualizar</button>
      </div>
      <div class="card-wrap">
        <table class="log-table">
          <thead><tr><th>Usuário</th><th>Método</th><th>Rota</th><th>Status</th><th>Duração</th><th>Horário</th></tr></thead>
          <tbody id="log-tbody"><tr><td colspan="6" style="text-align:center;color:#4b5563;padding:24px">Carregando…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- ── Perfil ── -->
    <div class="section" id="sec-profile">
      <div class="profile-card">
        <div id="profile-avatar" class="profile-avatar-big"></div>
        <div id="profile-name" class="profile-name"></div>
        <div id="profile-role" class="profile-role"></div>
        <div class="divider"></div>
        <div class="field">
          <label>Nome de exibição</label>
          <input type="text" id="p-display-name">
        </div>
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="p-email">
        </div>
        <div class="field">
          <label>Cor do avatar</label>
          <div class="color-picker-wrap" id="p-color-picker"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:4px;width:100%" onclick="saveProfile()">Salvar perfil</button>
        <div class="divider"></div>
        <p style="font-size:13px;font-weight:600;margin-bottom:14px">Alterar senha</p>
        <div class="field">
          <label>Senha atual</label>
          <input type="password" id="p-current-pw" autocomplete="current-password">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Nova senha</label>
            <input type="password" id="p-new-pw" autocomplete="new-password">
          </div>
          <div class="field">
            <label>Confirmar</label>
            <input type="password" id="p-confirm-pw" autocomplete="new-password">
          </div>
        </div>
        <button class="btn btn-ghost" style="width:100%" onclick="changePassword()">Alterar senha</button>
        <div id="profile-msg" style="margin-top:10px;font-size:12px;display:none"></div>
      </div>
    </div>
  </div>
</main>

<!-- ── Modal criar usuário ── -->
<div class="modal-bg" id="create-modal">
  <div class="modal">
    <h3 id="modal-title">Novo colaborador</h3>
    <div class="field-row">
      <div class="field">
        <label>Username *</label>
        <input type="text" id="m-username" placeholder="joao.dev">
      </div>
      <div class="field">
        <label>Nome de exibição</label>
        <input type="text" id="m-display-name" placeholder="João Silva">
      </div>
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="m-email" placeholder="joao@empresa.com">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Senha *</label>
        <input type="password" id="m-password" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Papel</label>
        <select id="m-role">
          <option value="collaborator">Colaborador</option>
          <option value="owner">Owner</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Cor do avatar</label>
      <div class="color-picker-wrap" id="m-color-picker"></div>
    </div>
    <div id="modal-err" style="color:#f87171;font-size:12px;margin-top:8px;display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitCreate()">Criar</button>
    </div>
  </div>
</div>

<!-- ── Modal reset senha ── -->
<div class="modal-bg" id="reset-modal">
  <div class="modal">
    <h3>Resetar senha</h3>
    <p style="font-size:12px;color:#6b7280;margin-bottom:16px">Usuário: <strong id="reset-username-label"></strong></p>
    <div class="field">
      <label>Nova senha *</label>
      <input type="password" id="r-password" autocomplete="new-password">
    </div>
    <div id="reset-err" style="color:#f87171;font-size:12px;margin-top:8px;display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeResetModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitReset()">Resetar</button>
    </div>
  </div>
</div>

<script>
// ── Estado ────────────────────────────────────────────────────────────────────
let allUsers = []
let allLogs  = []
let me       = {}
let resetTargetId = null
const COLORS = ['#6366f1','#8b5cf6','#ec4899','#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#0ea5e9','#64748b']

// ── Tab ───────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab))
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + tab))
  if (tab === 'activity') startActivityStream()
  if (tab === 'users')    loadUsers()
  if (tab === 'profile')  loadProfile()
  // Se a URL é /admin/profile, ativa essa aba
  if (location.pathname === '/admin/profile') {
    switchTab('profile')
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'profile'))
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-profile'))
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function relTime(ts) {
  if (!ts) return '—'
  const diff = Math.floor(Date.now() / 1000) - ts
  if (diff < 60) return 'agora'
  if (diff < 3600) return `${Math.floor(diff/60)}m`
  if (diff < 86400) return `${Math.floor(diff/3600)}h`
  return new Date(ts * 1000).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: '2-digit' })
}
function esc(s) { return String(s || '').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function avatarHtml(user, size = 28) {
  const initial = (user.display_name || user.username || '?').charAt(0).toUpperCase()
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${user.avatar_color||'#6366f1'};font-size:${Math.round(size*0.43)}px">${initial}</div>`
}

// ── Usuários ──────────────────────────────────────────────────────────────────
async function loadUsers() {
  const r = await fetch('/api/admin/users')
  if (!r.ok) { document.getElementById('users-tbody').innerHTML = '<tr><td colspan="5" style="color:#f87171;text-align:center;padding:20px">Sem permissão</td></tr>'; return }
  const { users } = await r.json()
  allUsers = users || []
  renderUsers()
  renderStats()
  renderUserFilter()
}

function renderStats() {
  const total  = allUsers.length
  const owners = allUsers.filter(u => u.role === 'owner').length
  const active = allUsers.filter(u => u.is_active).length
  document.getElementById('users-stats').innerHTML = [
    ['total', 'Usuários', total],
    ['owners', 'Owners', owners],
    ['collabs', 'Colaboradores', total - owners],
    ['active', 'Ativos', active],
  ].map(([,l,n]) => `<div class="stat-card"><div class="stat-n">${n}</div><div class="stat-l">${l}</div></div>`).join('')
}

function renderUsers() {
  const tbody = document.getElementById('users-tbody')
  if (!allUsers.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#4b5563;padding:20px">Nenhum usuário</td></tr>'; return }
  tbody.innerHTML = allUsers.map(u => {
    const roleBadge = u.role === 'owner'
      ? `<span class="badge badge-owner">owner</span>`
      : `<span class="badge badge-collab">colaborador</span>`
    const statusBadge = u.is_active
      ? `<span style="color:#34d399;font-size:11px">ativo</span>`
      : `<span class="badge badge-inactive">inativo</span>`
    const toggleBtn = u.role !== 'owner'
      ? (u.is_active
          ? `<button class="btn btn-danger btn-sm" onclick="toggleUser(${u.id},false)">Desativar</button>`
          : `<button class="btn btn-success btn-sm" onclick="toggleUser(${u.id},true)">Ativar</button>`)
      : ''
    return `<tr>
      <td><div class="td-user">${avatarHtml(u)}<div><div class="td-username">${esc(u.username)}</div><div class="td-display">${esc(u.display_name)}</div></div></div></td>
      <td>${roleBadge}</td>
      <td>${relTime(u.last_login_at)}</td>
      <td>${statusBadge}</td>
      <td><div class="actions">
        ${toggleBtn}
        <button class="btn btn-ghost btn-sm" onclick="openResetModal(${u.id},'${esc(u.username)}')">Senha</button>
      </div></td>
    </tr>`
  }).join('')
}

function renderUserFilter() {
  const sel = document.getElementById('filter-user')
  const val = sel.value
  sel.innerHTML = '<option value="">Todos os usuários</option>' +
    allUsers.map(u => `<option value="${u.id}" ${u.id == val ? 'selected' : ''}>${esc(u.username)}</option>`).join('')
}

async function toggleUser(id, active) {
  await fetch(`/api/admin/users/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ is_active: active }) })
  loadUsers()
}

// ── Criar usuário ─────────────────────────────────────────────────────────────
let selectedCreateColor = '#8b5cf6'
function openCreateModal() {
  selectedCreateColor = '#8b5cf6'
  renderColorPicker('m-color-picker', COLORS, '#8b5cf6', (c) => selectedCreateColor = c)
  document.getElementById('m-username').value = ''
  document.getElementById('m-display-name').value = ''
  document.getElementById('m-email').value = ''
  document.getElementById('m-password').value = ''
  document.getElementById('m-role').value = 'collaborator'
  document.getElementById('modal-err').style.display = 'none'
  document.getElementById('create-modal').classList.add('show')
  document.getElementById('m-username').focus()
}
function closeModal() { document.getElementById('create-modal').classList.remove('show') }

async function submitCreate() {
  const body = {
    username:     document.getElementById('m-username').value.trim(),
    display_name: document.getElementById('m-display-name').value.trim(),
    email:        document.getElementById('m-email').value.trim(),
    password:     document.getElementById('m-password').value,
    role:         document.getElementById('m-role').value,
    avatar_color: selectedCreateColor,
  }
  const errEl = document.getElementById('modal-err')
  errEl.style.display = 'none'
  const r = await fetch('/api/admin/users', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
  const d = await r.json()
  if (!r.ok) { errEl.textContent = d.error; errEl.style.display = 'block'; return }
  closeModal()
  loadUsers()
}

// ── Reset senha ───────────────────────────────────────────────────────────────
function openResetModal(id, username) {
  resetTargetId = id
  document.getElementById('reset-username-label').textContent = username
  document.getElementById('r-password').value = ''
  document.getElementById('reset-err').style.display = 'none'
  document.getElementById('reset-modal').classList.add('show')
  setTimeout(() => document.getElementById('r-password').focus(), 100)
}
function closeResetModal() { document.getElementById('reset-modal').classList.remove('show') }

async function submitReset() {
  const newPassword = document.getElementById('r-password').value
  const errEl = document.getElementById('reset-err')
  errEl.style.display = 'none'
  const r = await fetch(`/api/admin/users/${resetTargetId}/reset-password`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ newPassword }) })
  const d = await r.json()
  if (!r.ok) { errEl.textContent = d.error; errEl.style.display = 'block'; return }
  closeResetModal()
}

// ── Atividade ─────────────────────────────────────────────────────────────────
let _es = null
function startActivityStream() {
  if (_es) return
  _es = new EventSource('/api/admin/activity/stream')
  _es.onmessage = e => {
    const d = JSON.parse(e.data)
    if (d.type === 'entry') {
      allLogs.unshift(d.entry)
      if (allLogs.length > 500) allLogs.pop()
      renderLogs()
    }
  }
  _es.onerror = () => { document.getElementById('live-dot').style.background = '#ef4444' }
  _es.onopen  = () => { document.getElementById('live-dot').style.background = '#22c55e' }
  reloadLogs()
}

async function reloadLogs() {
  const userId = document.getElementById('filter-user').value
  const url = '/api/admin/activity?limit=200' + (userId ? `&userId=${userId}` : '')
  const r = await fetch(url)
  const { logs } = await r.json()
  allLogs = logs || []
  renderLogs()
}

function filterLogsLocal() { renderLogs() }

function renderLogs() {
  const q    = document.getElementById('filter-path')?.value?.toLowerCase() || ''
  const logs = q ? allLogs.filter(l => l.path.toLowerCase().includes(q)) : allLogs
  const tbody = document.getElementById('log-tbody')
  if (!logs.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#4b5563;padding:20px">Nenhum log</td></tr>'; return }
  const userMap = {}
  allUsers.forEach(u => userMap[u.id] = u)
  tbody.innerHTML = logs.slice(0, 200).map(l => {
    const u = userMap[l.user_id] || { username: l.username, avatar_color: '#4b5563', display_name: l.username }
    const sc = l.status_code
    const statusClass = !sc ? '' : sc < 300 ? 'status-ok' : sc < 400 ? 'status-warn' : 'status-err'
    const t = new Date(l.created_at * 1000)
    const time = t.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
    return `<tr>
      <td><div class="log-user"><div class="log-avatar" style="background:${u.avatar_color}">${(u.display_name||u.username||'?').charAt(0).toUpperCase()}</div>${esc(u.username)}</div></td>
      <td><span class="method-badge method-${l.method}">${l.method}</span></td>
      <td><span class="log-path" title="${esc(l.path)}">${esc(l.path)}</span></td>
      <td class="${statusClass}">${l.status_code || '—'}</td>
      <td>${l.duration_ms != null ? l.duration_ms + 'ms' : '—'}</td>
      <td style="color:#4b5563;white-space:nowrap">${time}</td>
    </tr>`
  }).join('')
}

// ── Perfil ────────────────────────────────────────────────────────────────────
let selectedProfileColor = '#6366f1'
async function loadProfile() {
  const r = await fetch('/api/me')
  const { user } = await r.json()
  me = user || {}
  selectedProfileColor = me.avatar_color || '#6366f1'
  document.getElementById('profile-avatar').style.background = selectedProfileColor
  document.getElementById('profile-avatar').textContent = (me.display_name || me.username || '?').charAt(0).toUpperCase()
  document.getElementById('profile-name').textContent = me.display_name || me.username || ''
  document.getElementById('profile-role').textContent = me.role === 'owner' ? 'Proprietário' : 'Colaborador'
  document.getElementById('p-display-name').value = me.display_name || ''
  document.getElementById('p-email').value = me.email || ''
  renderColorPicker('p-color-picker', COLORS, selectedProfileColor, (c) => {
    selectedProfileColor = c
    document.getElementById('profile-avatar').style.background = c
  })
}

async function saveProfile() {
  const body = {
    display_name: document.getElementById('p-display-name').value.trim(),
    email:        document.getElementById('p-email').value.trim(),
    avatar_color: selectedProfileColor,
  }
  const r = await fetch(`/api/admin/users/${me.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
  showProfileMsg(r.ok ? '✓ Perfil salvo' : '✗ Erro ao salvar', r.ok ? '#34d399' : '#f87171')
  if (r.ok) loadProfile()
}

async function changePassword() {
  const current     = document.getElementById('p-current-pw').value
  const newPassword = document.getElementById('p-new-pw').value
  const confirm     = document.getElementById('p-confirm-pw').value
  if (newPassword !== confirm) return showProfileMsg('✗ As senhas não coincidem', '#f87171')
  if (newPassword.length < 6)  return showProfileMsg('✗ Senha muito curta (mínimo 6 chars)', '#f87171')
  const r = await fetch('/api/me/password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ current, newPassword }) })
  const d = await r.json()
  showProfileMsg(r.ok ? '✓ Senha alterada' : '✗ ' + d.error, r.ok ? '#34d399' : '#f87171')
  if (r.ok) { document.getElementById('p-current-pw').value = ''; document.getElementById('p-new-pw').value = ''; document.getElementById('p-confirm-pw').value = '' }
}

function showProfileMsg(msg, color) {
  const el = document.getElementById('profile-msg')
  el.textContent = msg
  el.style.color = color
  el.style.display = 'block'
  setTimeout(() => el.style.display = 'none', 3000)
}

// ── Color picker ──────────────────────────────────────────────────────────────
function renderColorPicker(containerId, colors, selected, onChange) {
  const wrap = document.getElementById(containerId)
  wrap.innerHTML = colors.map(c =>
    `<div class="color-opt${c === selected ? ' selected' : ''}" style="background:${c}" data-color="${c}" onclick="pickColor('${containerId}','${c}')"></div>`
  ).join('')
  wrap._onChange = onChange
}
function pickColor(containerId, color) {
  const wrap = document.getElementById(containerId)
  wrap.querySelectorAll('.color-opt').forEach(el => el.classList.toggle('selected', el.dataset.color === color))
  if (wrap._onChange) wrap._onChange(color)
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadUsers()
  // Detecta aba de perfil pela URL
  if (location.pathname === '/admin/profile') {
    switchTab('profile')
  }
  // Fecha modais ao clicar fora
  document.getElementById('create-modal').addEventListener('click', e => { if (e.target.id === 'create-modal') closeModal() })
  document.getElementById('reset-modal').addEventListener('click', e => { if (e.target.id === 'reset-modal') closeResetModal() })
})
</script>
